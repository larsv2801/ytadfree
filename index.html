<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json?v=1.0.4">
    <title>Youtube ad free</title>
    <style>
        body{
            margin:0;
            padding:0;
            overflow:hidden;
        }
        iframe{
            width:100dvw;
            height:100dvh;
            padding:0;
            margin:0;
            border:none;
            outline:none;
        }
    </style>
</head>
<body>
    <iframe id="videoiframe"
    src=""
    frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" 
    allowfullscreen></iframe>

    <script>
        const params = new URLSearchParams(window.location.search);
        const yturl = decodeURIComponent(params.get("url"));

        function getVideoId(url) {
            if (url.hostname === "youtu.be") {
                return url.pathname.slice(1);
            }

            if (url.searchParams && url.searchParams.has("v")) {
                return url.searchParams.get("v");
            }

            return null;
        }

        if (yturl && yturl !== 'null' && yturl.trim() !== '') {
        try {
            const videoid = getVideoId(new URL(yturl));
            console.log("Video ID gevonden:", videoid);

            if (videoid) {
                document.getElementById("videoiframe").src = `https://www.yout-ube.com/embed/${videoid}`;
            }
        } catch (e) {
            console.error("Geen geldige URL om te parsen:", yturl);
        }
        }


        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/ytadfree/service-worker.js")
            .then(() => console.log("Service worker geregistreerd"))
            .catch(err => console.error("Fout:", err));
        }

    </script>
</body>
</html>
